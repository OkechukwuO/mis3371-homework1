<!DOCTYPE html>
<html>
<head>
    <title>Hummingbird Medical - Patient Registration</title>
</head>
<body>

<!-- BANNER -->
<div class="banner">

    <img src="hbmediclogo.png" alt="Hummingbird Medical Logo" width="120">

    <div>
        <h1>Hummingbird Medical</h1>
        <h2>Patient Registration Form</h2>

        <p id="today"></p>
    </div>

</div>

<script>
//Display current date in the banner section
function showDate() 
    {
    document.getElementById("today").innerHTML =
        "Today is: " + new Date().toDateString();
    }
window.onload = showDate;
</script>

<!----Form section--->
<form>

<table border="1">

    <!-- Patient Name Section -->
    <tr>
        <td colspan="3">
            Patient's Name (First, MI, Last):
        </td>
    </tr>

    <!-- PATIENT NAME INPUTS -->
    <tr>
        <td>
            <input type="text" maxlength="30" placeholder="First Name">
        </td>

        <td>
            <input type="text" maxlength="1" placeholder="MI">
        </td>

        <td>
            <input type="text" maxlength="30" placeholder="Last Name">
        </td>
    </tr>
<!---Phone number--->
<tr>
        <td colspan="3">Patient Phone Number:</td>
    </tr>

    <tr>
        <td colspan="3">
            <input type="text" maxlength="15" placeholder="(###) ###-####">
        </td>
    </tr>
<!---Address--->
<tr>
        <td colspan="3">Address:</td>
    </tr>

    <tr>
        <td colspan="3">
            <input type="text" maxlength="60" placeholder="Street Address">
        </td>
    </tr>
    
</table>
    
</form>
    
</body>
</html>
